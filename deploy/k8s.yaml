apiVersion: apps/v1
kind: Deployment
metadata: { name: pactgen, labels: { app: pactgen } }
spec:
  replicas: 1
  selector: { matchLabels: { app: pactgen } }
  template:
    metadata: { labels: { app: pactgen } }
    spec:
      containers:
        - name: pactgen
          image: ghcr.io/cognis-digital/pactgen:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: pactgen }
spec:
  selector: { app: pactgen }
  ports: [{ port: 80, targetPort: 8000 }]
